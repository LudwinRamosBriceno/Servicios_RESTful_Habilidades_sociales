server {
  listen 80;
  server_name _;

  add_header Access-Control-Allow-Origin "*" always;
  add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
  add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept, Origin, X-Requested-With" always;
  add_header Access-Control-Max-Age 86400 always;

  if ($request_method = OPTIONS) {
    return 204;
  }

  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;

  location = /api/orders {
    proxy_pass http://orders-service:8000/orders;
  }

  location /api/orders/ {
    rewrite ^/api/orders/?(.*)$ /orders/$1 break;
    proxy_pass http://orders-service:8000;
  }

  location = /api/auth/login {
    proxy_pass http://auth-service:8004/login;
  }

  location /api/auth/ {
    rewrite ^/api/auth/?(.*)$ /$1 break;
    proxy_pass http://auth-service:8004;
  }

  location = /api/users {
    proxy_pass http://users-service:8001/users;
  }

  location /api/users/ {
    rewrite ^/api/users/?(.*)$ /users/$1 break;
    proxy_pass http://users-service:8001;
  }

  location = /api/products {
    proxy_pass http://products-service:8002/products;
  }

  location /api/products/ {
    rewrite ^/api/products/?(.*)$ /products/$1 break;
    proxy_pass http://products-service:8002;
  }

  location = /api/notifications {
    proxy_pass http://notifications-service:8003/notifications;
  }

  location /api/notifications/ {
    rewrite ^/api/notifications/?(.*)$ /notifications/$1 break;
    proxy_pass http://notifications-service:8003;
  }

  # Health shortcuts through gateway.
  location = /api/orders-health {
    proxy_pass http://orders-service:8000/health;
  }

  location = /api/notifications-health {
    proxy_pass http://notifications-service:8003/notifications/health;
  }
}
