apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      initContainers:
        - name: wait-for-upstreams
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z users-service 8001; do echo "Esperando users-service:8001..."; sleep 2; done
              until nc -z products-service 8002; do echo "Esperando products-service:8002..."; sleep 2; done
              until nc -z orders-service 8000; do echo "Esperando orders-service:8000..."; sleep 2; done
              until nc -z notifications-service 8003; do echo "Esperando notifications-service:8003..."; sleep 2; done
      containers:
        - name: api-gateway
          image: api-gateway:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
spec:
  selector:
    app: api-gateway
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 80
      nodePort: 30090
  type: NodePort
